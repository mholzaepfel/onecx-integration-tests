name: Integration Tests

on:
  workflow_call: {}
  workflow_dispatch: {}
  schedule:
    - cron: "0 2 * * *"
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    permissions:
      contents: read
    env:
      CI: true
      DEBUG: "testcontainers*"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Environment
        uses: ./.github/actions/setup-environment
      - name: Run integration tests (default config)
        run: npm run integration-tests
      - name: Upload E2E Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ github.run_id }}
          path: e2e-results/
          retention-days: 14
          if-no-files-found: warn
      - name: Container logs (on failure)
        if: failure()
        run: |
          echo "=== last logs from all containers ==="
          for c in $(docker ps -aq); do
            CONTAINER_INFO=$(docker inspect --format='{{.Name}} [{{.Config.Image}}]' "$c" | sed 's/^\///')
            echo "----- logs for $CONTAINER_INFO (ID: $c) -----"
            docker logs --tail=200 "$c" || true
          done
